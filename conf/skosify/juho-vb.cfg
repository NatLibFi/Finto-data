[options]
narrower=True
transitive=False
enrich_mappings=False
aggregates=True
debug=False
break_cycles=True
cleanup_properties=True
cleanup_classes=True
cleanup_unreachable=True
set_modified=True
mark_top_concepts=False
eliminate_redundancy=True
namespace=http://www.yso.fi/onto/juho/
update_query=
	PREFIX dct: <http://purl.org/dc/terms/>
	PREFIX owl: <http://www.w3.org/2002/07/owl#>
	PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
	PREFIX skosext: <http://purl.org/finnonto/schema/skosext#>
	PREFIX juho-meta: <http://www.yso.fi/onto/juho-meta/>
	PREFIX yso-meta: <http://www.yso.fi/onto/yso-meta/>

	DELETE {
	  <http://www.yso.fi/onto/juho/> skos:hasTopConcept ?top .
	  ?top skos:topConceptOf <http://www.yso.fi/onto/juho/> .
	  <http://www.yso.fi/onto/yso/> skos:hasTopConcept ?juhoTopConcept .
	  ?juhoTopConcept skos:topConceptOf <http://www.yso.fi/onto/yso/> .
	  <http://www.yso.fi/onto/yso/> a skos:ConceptScheme .
	  ?ysoConcept skos:inScheme <http://www.yso.fi/onto/yso/> .
	  ?editorSubject skos:editorialNote ?editorialNote .
	  ?commentSubject yso-meta:comment ?deprecatedComment .
	  juho-meta:juho-kasitteet ?juhoMetaPredicate ?juhoMetaObject .
	  ?juhoMetaSubject ?juhoMetaRefPredicate juho-meta:juho-kasitteet .
	}
	INSERT {
	  <http://www.yso.fi/onto/juho/> skos:hasTopConcept ?juhoTopConcept .
	  ?juhoTopConcept skos:topConceptOf <http://www.yso.fi/onto/juho/> .
	  ?ysoConcept skos:inScheme <http://www.yso.fi/onto/juho/> .
	  ?editorSubject dct:modified ?editorialNote .
	  ?s a ?newType .
	}
	WHERE {
	  {
	    OPTIONAL { <http://www.yso.fi/onto/juho/> skos:hasTopConcept ?top . }
	    OPTIONAL { ?top skos:topConceptOf <http://www.yso.fi/onto/juho/> . }
	  }
	  UNION
	  {
	    ?editorSubject skos:editorialNote ?editorialNote .
	    FILTER(STRSTARTS(STR(?editorSubject), "http://www.yso.fi/onto/juho/"))
	    FILTER(REGEX(STR(?editorialNote), "^[0-9]{8}$"))
	  }
	  UNION
	  {
	    ?commentSubject yso-meta:comment ?deprecatedComment .
	    ?commentSubject owl:deprecated true .
	    FILTER(REGEX(STR(?deprecatedComment), "^deprecated on "))
	  }
	  UNION
	  {
	    juho-meta:juho-kasitteet ?juhoMetaPredicate ?juhoMetaObject .
	  }
	  UNION
	  {
	    ?juhoMetaSubject ?juhoMetaRefPredicate juho-meta:juho-kasitteet .
	  }
	  UNION
	  {
	    VALUES ?juhoTopConcept {
	      <http://www.yso.fi/onto/yso/p15238>
	      <http://www.yso.fi/onto/yso/p4762>
	      <http://www.yso.fi/onto/yso/p8691>
	    }
	  }
	  UNION
	  {
	    <http://www.yso.fi/onto/yso/> a skos:ConceptScheme .
	  }
	  UNION
	  {
	    ?ysoConcept a skos:Concept .
	    FILTER(STRSTARTS(STR(?ysoConcept), "http://www.yso.fi/onto/yso/"))
	    OPTIONAL { ?ysoConcept skos:inScheme <http://www.yso.fi/onto/yso/> . }
	  }
	  UNION
	  {
	    FILTER(STRSTARTS(STR(?s), "http://www.yso.fi/onto/juho/"))
	    FILTER NOT EXISTS { ?s a ?type . }
	    {
	      ?s owl:deprecated true .
	      BIND(skosext:DeprecatedConcept AS ?newType)
	    }
	    UNION
	    {
	      ?s ?p ?o .
	      VALUES ?p {
	        skos:prefLabel
	        skos:altLabel
	        skos:hiddenLabel
	        skos:broader
	        skos:related
	        skos:exactMatch
	        skos:closeMatch
	        skos:broadMatch
	        skos:narrowMatch
	        skos:note
	        skos:scopeNote
	        skos:definition
	        <http://www.yso.fi/onto/juho-meta/hasSelite>
	        <http://www.yso.fi/onto/juho-meta/hasThematicGroup>
	        <http://www.yso.fi/onto/juho-meta/related>
	        <http://www.yso.fi/onto/yso-meta/singularPrefLabel>
	        <http://www.yso.fi/onto/yso-meta/singularAltLabel>
	      }
	      FILTER NOT EXISTS { ?s owl:deprecated true . }
	      BIND(skos:Concept AS ?newType)
	    }
	  }
	}

